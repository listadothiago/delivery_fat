# ==========================================
# CONFIGURAÇÕES DA APLICAÇÃO E SERVIDOR
# ==========================================
spring.application.name=deliverytech_fat
server.port=8080

# ==========================================
# CONFIGURAÇÕES DO H2 DATABASE
# ==========================================
spring.datasource.url=jdbc:h2:mem:deliverydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true
spring.data.web.pageable.max-page-size=100

# ==========================================
# DESENVOLVIMENTO E LOGS
# ==========================================
spring.devtools.restart.enabled=true
logging.level.org.springframework.web=DEBUG

# ==========================================
# SEGURANÇA E JWT
# ==========================================
# Mudei para incluir valores padrão caso as variáveis não estejam setadas no ambiente
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# ==========================================
# ACTUATOR, PROMETHEUS E OBSERVABILIDADE (NOVOS)
# ==========================================
# Expondo todos os endpoints
management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

# Health & Métricas
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.endpoint.prometheus.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.info.enabled=true

# Tracing e Zipkin
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Informações da Aplicação (Endpoint /info)
info.app.name=Sistema de Delivery
info.app.description=API REST para sistema de delivery com observabilidade
info.app.version=1.0.0
info.team.name=Equipe de Desenvolvimento
info.team.email=dev@delivery.co

# ==========================================
# REDIS (CACHE DISTRIBUÍDO)
# ==========================================
spring.redis.host=localhost
spring.redis.port=6379